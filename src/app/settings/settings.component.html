<div>
    <h3>{{ 'settings.locale.title' | translate }}</h3>
    <div>
        <label for="lang-select">{{ 'settings.locale.label' | translate }}</label>
        <select id="lang-select" class="spacingleftsmall" [formControl]="langSelect" (change)="selectLanguage()">
            @for (lang of langService.getAvailabelLangs(); track lang) {
                <option value="{{lang}}">{{langService.getLangName(lang)}}</option>
            }
        </select>
    </div>
</div>
