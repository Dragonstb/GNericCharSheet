<div>
    @if(item) {
        <button class="accordeonhead secondarycol" (click)="toggleExpansion()" [attr.aria-controls]="'compitem-'+item.getId()" [attr.aria-expanded]="expanded()">
            <h5 class="inheritbg">{{item.name.value}}</h5>
            <svg class="svgicon size15 inheritbg" aria-hidden="true"
            viewBox="0 0 10 10"
            xmlns="http://www.w3.org/2000/svg"
            xmlns:svg="http://www.w3.org/2000/svg">
            @if(!expanded()) {
                <path
                    style="fill:inherit;fill-opacity:1;stroke:none;stroke-width:0.264583px;stroke-linecap:butt;stroke-linejoin:miter;stroke-opacity:1"
                    d="M 2.3,9 V 1 l 6,4 z" />
            }
            @else {
                <path
                    style="fill:inherit;fill-opacity:1;stroke:none;stroke-width:0.264583px;stroke-linecap:butt;stroke-linejoin:miter;stroke-opacity:1"
                    d="m 1,2.3 h 8 l -4,6 z" />
            }
            </svg>
        </button>
        @if(expanded()) {
            <div id="compitem-{{item.getId()}}" class="spacingbottomsmall">
                @for(line of item.getLines(); track $index) {
                    <div>{{line}}</div>
                }
            </div>
            <div class="spacingbottommedium flexend">
                <button (click)="selectThis()">{{'compendium.ro.copy_item'|translate}}</button>
            </div>
        }
    }
</div>
