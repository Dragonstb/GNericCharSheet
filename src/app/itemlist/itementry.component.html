<button class="accordeonhead secondarycol" (click)="toggleExpansion()" [attr.aria-controls]="'item-'+model.getId()" [attr.aria-expanded]="expanded">
    <h5 class="inheritbg">{{model.name.value}}</h5>
    <svg class="svgicon size15 inheritbg" aria-hidden="true"
    viewBox="0 0 10 10"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:svg="http://www.w3.org/2000/svg">
    @if(!expanded) {
        <path
            class="accordeonarrow"
            d="M 2.3,9 V 1 l 6,4 z" />
    }
    @else {
        <path
            class="accordeonarrow"
            d="m 1,2.3 h 8 l -4,6 z" />
    }
    </svg>
</button>
@if(expanded) {
    <div id="item-{{model.getId()}}">
        @if(!editable) {
            @for(line of model.getLines(); track $index) {
                <div>{{line}}</div>
            }
        }
        @else{
            <div>
                <label for="item-name-{{model.getId()}}">{{'itementry.name'|translate}}</label>
                <input type="text" id="item-name-{{model.getId()}}" (input)="fireElemChangeEvent()" [formControl]="model.name">
            </div>
            <textarea rows="7" (input)="fireElemChangeEvent()" [formControl]="model.text"></textarea>
        }
    </div>
    @if(deletable) {
        <div class="flexend spacingbottommedium spacingtopmedium">
            <button [translate]="'itementry.delete'" [translateParams]="{name: model.name.value}" (click)="requestDeletionOfEntry()"></button>
        </div>
    }
}
<gneric-delitemdialog #modal (acceptDeletionEvent)="fireDeleteEntryEvent()" />
