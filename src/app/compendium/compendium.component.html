<div>
    <div class="spacingbottomlarge">
        @if(editable && isGM) {
            <div>
                <label for="new-chapter-name-input">{{'compendium.add_chapter'|translate}}</label>
                <input id="new-chapter-name-input" class="spacingleftsmall spacingrightsmall" type="text" [formControl]="newChapterInput" >
                <button [disabled]="!newChapterInput.valid" (click)="createChapter()">{{'compendium.create_chapter'|translate}}</button>
            </div>
        }
        <div>
            <label for="compendiumChapterSelect">{{'compendium.select_chapter'|translate}}</label>
            <select id="compendiumChapterSelect" class="spacingleftsmall spacingrightsmall" [formControl]="chapterSelect" (change)="selectChapter()">
                @for(chapter of compModel.chapters; track chapter.getId()) {
                    <option value="{{chapter.getId()}}">
                        {{chapter.getName()}}
                    </option>
                }
            </select>
        </div>
    </div>
    <div>
        <hr class="spacingtopmedium spacingbottomlarge">
        <gneric-compchapter [chapter]="currentChapter()" [isGM]="isGM" [editable]="editable" (gNericElemChangedEvent)="reactOnChange($event)" />
    </div>
    @if(editable && isGM) {
        <hr class="spacingtoplarge spacingbottommedium">
        <div class="flexend">
            <button [disabled]="!currentChapter()" (click)="openDeleteDialog()">{{'compendium.delete_chapter'|translate}}</button>
        </div>
    }
    <gneric-deldialog #dialog [text]="'compendium.delete_chapter_headline'|translate" (acceptDeletionEvent)="deleteChapter()" />
</div>
